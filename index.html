<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <h1>Count sheeps and sleep!</h1>
            <img src="jumping-sheep.png" alt="Illustration of a sheep jumping over a fence"/>
            <h2>Sheeps over the fence:</h2>
            <h2 id="count-el">0</h2>
            <button id="increment-btn" onclick="increment()">+1</button>
            <button id="save-btn" onclick="save()">SAVE</button>
            <p id="save-el">Previous entries: </p>
        </div>
        <script src="index.js"></script>
    </body>
</html>
